  # ─────────────────────────────────────────────────
  # AI ASSISTANT
  # ─────────────────────────────────────────────────

  /cars/{carId}/chat:
    parameters:
      - in: path
        name: carId
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags:
        - AI Assistant
      summary: Send a message to the AI assistant
      description: |
        Sends a message and streams the AI response
        using Server-Sent Events (SSE).

        **RAG pipeline (automatic):**
        1. User question is embedded via OpenAI
        2. pgvector finds most relevant car records
        3. Car profile always included in context
        4. Retrieved context injected into Claude prompt
        5. Response streamed token by token via SSE

        **Tool awareness:**
        The AI has access to the user's garage tools
        list and factors this into DIY advice (FR-26).

        **Vision support:**
        If inspirationImageUrl is provided, the AI
        analyses the image and can generate a build
        plan from it (FR-27, FR-28).

        **Fallback:**
        If Anthropic Claude is unavailable, the system
        falls back to OpenAI automatically (FR-25).

        **Rate limit:** 20 requests per user per hour
        (NFR-15). Returns 429 with Retry-After when
        exceeded.

        **Requirements:** FR-21, FR-22, FR-23, FR-25,
        FR-26, FR-27, FR-28, NFR-02, NFR-03, NFR-15
      parameters:
        - $ref: '#/components/parameters/ChannelToken'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: |
            SSE stream of AI response tokens.

            Event stream format:
            ```
            event: token
            data: {"token": "Based"}

            event: token
            data: {"token": " on"}

            event: token
            data: {"token": " your"}

            event: done
            data: {"conversationId": "uuid", "messageId": "uuid", "tokenCount": 312}

            event: error
            data: {"message": "AI provider unavailable. Please try again."}
            ```
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE token stream
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '503':
          description: |
            AI provider unavailable and fallback exhausted.
            Circuit breaker is open. Retry after 30 seconds.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: https://api.wrench.ai/errors/ai-unavailable
                title: AI Assistant Unavailable
                status: 503
                detail: The AI assistant is temporarily unavailable. Your car data is safe. Please try again in a few minutes.
                instance: /v1/cars/550e8400/chat
                requestId: 01HXYZ123ABC

  /cars/{carId}/conversations:
    parameters:
      - in: path
        name: carId
        required: true
