        **Validation:** MIME type validated server-side,
        not just file extension.

        **Usage:**
        1. Upload photo → get back Cloudinary URL
        2. Include URL when creating or updating
           a mod, service record, or budget entry

        **Requirements:** FR-28, NFR-04, NFR-27
      parameters:
        - $ref: '#/components/parameters/ChannelToken'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - type
              properties:
                file:
                  type: string
                  format: binary
                  description: Photo file. Max 10MB.
                type:
                  type: string
                  enum: [mod, service, inspiration, receipt]
                  description: |
                    What the photo is for.
                    Determines the Cloudinary folder
                    and access rules.
                carId:
                  type: string
                  format: uuid
                  description: |
                    Required for mod, service, and
                    inspiration photos.
      responses:
        '201':
          description: Photo uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '422':
          description: File too large, wrong format, or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                type: https://api.wrench.ai/errors/invalid-file
                title: Invalid File
                status: 422
                detail: File must be JPEG, PNG, or WebP and under 10MB.
                instance: /v1/upload/photo
                requestId: 01HXYZ123ABC
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'

