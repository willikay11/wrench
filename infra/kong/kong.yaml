# infra/kong/kong.yaml

_format_version: "3.0"
_transform: true

services:
  - name: wrench-api
    url: http://wrench.railway.internal:8080
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000

    routes:
      - name: api-routes
        paths:
          - /v1
          - /health
        strip_path: false
        preserve_host: false
        protocols:
          - http
          - https

plugins:
  - name: rate-limiting
    config:
      hour: 1000
      policy: redis
      # Updated: redis.host instead of redis_host
      redis:
        host: redis.railway.internal
        port: 6379
        username: default
        password: $(KONG_REDIS_PASSWORD)
      hide_client_headers: true
      fault_tolerant: true

  - name: cors
    config:
      origins:
        - https://wrench.ai
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Channel-Token
        - X-Request-ID
      credentials: true
      max_age: 3600

  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes