# infra/kong/kong.yaml

_format_version: "3.0"
_transform: true

services:
  - name: wrench-api
    url: http://wrench.railway.internal:8080
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000

    routes:
      - name: api-routes
        paths:
          - /v1
          - /health
        strip_path: false
        preserve_host: false
        protocols:
          - http
          - https

plugins:
  # Rate limiting — per IP, catch-all
  - name: rate-limiting
    config:
      hour: 1000
      policy: redis
      redis_host: redis.railway.internal
      redis_port: 6379
      hide_client_headers: true
      fault_tolerant: true

  # CORS
  - name: cors
    config:
      origins:
        - https://wrench.it.com
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Channel-Token
        - X-Request-ID
      credentials: true
      max_age: 3600

  # Correlation ID — adds X-Request-ID to every request
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  # Request size limit — reject > 10MB before Go API
  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes