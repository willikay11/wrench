services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    env_file:
      - ./apps/web/.env.local
    depends_on:
      - api
      - db

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    environment:
      - ENVIRONMENT=development
    env_file:
      - ./apps/api/.env
    depends_on:
      - db

  db:
    image: supabase/postgres:15.1.0.117
    ports:
      - "5555:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wrench
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
